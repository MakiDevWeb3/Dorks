        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1f1f1f;
            --bg-hover: #252525;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-tertiary: #71717a;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: rgba(59, 130, 246, 0.1);
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --gradient-3: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.2;
        }
        
        code, pre {
            font-family: 'IBM Plex Mono', monospace;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--text-tertiary);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
        
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
            animation: gridFloat 30s linear infinite;
        }
        
        @keyframes gridFloat {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }
        
        .gradient-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }
        
        .orb-1 {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: -250px;
            right: -250px;
            animation-delay: 0s;
        }
        
        .orb-2 {
            width: 400px;
            height: 400px;
            background: #8b5cf6;
            bottom: -200px;
            left: -200px;
            animation-delay: 5s;
        }
        
        .orb-3 {
            width: 600px;
            height: 600px;
            background: #f59e0b;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 10s;
            opacity: 0.1;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        
        .glass {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
        }
        
        .glass-strong {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--border-hover);
        }
        
        .btn-primary {
            background: var(--gradient-2);
            color: white;
            border: none;
            padding: 0.875rem 1.75rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1.5px solid var(--border);
            padding: 0.875rem 1.75rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-secondary:hover {
            border-color: var(--accent);
            background: var(--accent-light);
            transform: translateY(-1px);
        }
        
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .input-field {
            background: var(--bg-tertiary);
            border: 1.5px solid var(--border);
            color: var(--text-primary);
            padding: 0.875rem 1.25rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-secondary);
            box-shadow: 0 0 0 4px var(--accent-light);
        }
        
        .code-block {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            overflow-x: auto;
        }
        
        .badge-success {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: var(--success);
        }
        
        .nav-pill {
            padding: 0.625rem 1.25rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        
        .nav-pill:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .nav-pill.active {
            color: var(--text-primary);
            background: var(--bg-tertiary);
            border-color: var(--border);
        }
        
        .fade-in {
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .feature-icon {
            width: 4rem;
            height: 4rem;
            background: var(--accent-light);
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1.5rem;
        }
        
        ::selection {
            background: var(--accent);
            color: white;
        }
        
        .engine-card {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .engine-card:hover {
            transform: translateY(-5px) scale(1.05);
        }
        
        .engine-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .engine-card:hover::after {
            opacity: 1;
        }
    </style>

                        {currentView === 'docs' && <Documentation currentLang={currentLang} />}
                        {currentView === 'builder' && (
                            <Builder 
                                savedDorks={savedDorks}
                                saveDork={saveDork}
                                setCurrentView={setCurrentView}
                                currentLang={currentLang}
                            />
                        )}
                        {currentView === 'saved' && (
                            <Saved 
                                savedDorks={savedDorks}
                                deleteDork={deleteDork}
                                setCurrentView={setCurrentView}
                                currentLang={currentLang}
                            />
                        )}
                        {currentView === 'about' && <About currentLang={currentLang} />}
                    </main>
                    
                    <footer className="border-t border-[var(--border)] glass-strong mt-auto">
                        <div className="max-w-7xl mx-auto px-6 py-10">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-8">
                                <div className="flex items-center gap-4">
                                    <img 
                                        src="https://prod-image-cdn.tensor.trade/images/slug=2c6c34a6-a621-4c5c-a47c-af0aac421579/400x400/freeze=false/https%3A%2F%2Fgateway.irys.xyz%2FCeRVqfexaq6KLjhwmfoS9aE4mgQL9Txv5ToTV9CzAG5n"
                                        alt="Maki"
                                        className="w-12 h-12 rounded-xl object-cover border-2 border-[var(--border-hover)] cursor-pointer hover:scale-110 transition-transform"
                                        onClick={() => setCurrentView('about')}
                                    />
                                    <div className="text-left">
                                        <p className="text-[var(--text-secondary)] font-semibold mb-1">
                                            {t.madeWith} ❤️ {t.by} <span className="text-[var(--accent)]">Maki</span>
                                        </p>
                                        <p className="text-xs text-[var(--text-tertiary)]">{t.version}</p>
                                    </div>
                                </div>
                                
                                <div className="text-center">
                                    <p className="text-[var(--text-secondary)] mb-2">{t.copyright}</p>
                                    <p className="text-xs text-[var(--text-tertiary)] flex items-center gap-2 justify-center">
                                        <i className="fas fa-shield-alt text-[var(--success)]"></i>
                                        {t.ethicalUse}
                                    </p>
                                </div>
                                
                                <div className="flex flex-col items-center md:items-end gap-3">
                                    <div className="badge badge-success">
                                        <i className="fas fa-database"></i>
                                        {t.localStorageActive}
                                    </div>
                                    <div className="flex gap-3">
                                        <a 
                                            href="https://www.tiktok.com/@tobeamaki" 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="text-[var(--text-tertiary)] hover:text-[var(--accent)] transition-colors"
                                        >
                                            <i className="fab fa-tiktok text-lg"></i>
                                        </a>
                                        <a 
                                            href="https://tobeamaki.store/" 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="text-[var(--text-tertiary)] hover:text-[var(--accent)] transition-colors"
                                        >
                                            <i className="fas fa-globe text-lg"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
